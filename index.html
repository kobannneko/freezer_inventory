<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ふりこれ</title>
  <meta name="description" content="冷凍庫の在庫を、かわいく・かんたんに確認するアプリ" />
  <meta name="theme-color" content="#ffdce7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="ふりこれ" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="apple-touch-icon" href="furikore_icon_180.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="furikore_icon_192.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <style>
    :root {
      --bg: #fff8f9;
      --bg-2: #f1fcfb;
      --card: rgba(255, 255, 255, 0.92);
      --text: #3d2f36;
      --muted: #7a6d75;
      --line: #f2dfe5;
      --primary: #ff7fa2;
      --primary-dark: #ef5f89;
      --mint: #a8e6df;
      --mint-dark: #54bfb3;
      --cream: #fff4d8;
      --danger: #f56b6b;
      --warn: #f7a948;
      --ok: #4dbb8d;
      --shadow: 0 18px 40px rgba(120, 78, 93, 0.13);
      --soft-shadow: 0 10px 26px rgba(120, 78, 93, 0.08);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    html { background: var(--bg); }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 10% 0%, rgba(255, 220, 231, 0.85), transparent 30%),
        radial-gradient(circle at 90% 5%, rgba(196, 244, 239, 0.75), transparent 32%),
        linear-gradient(180deg, #fff8fb 0%, #fffdf8 45%, #f5fffd 100%);
      color: var(--text);
      line-height: 1.55;
      min-height: 100vh;
    }

    header {
      padding: calc(22px + env(safe-area-inset-top)) 18px 18px;
      background: linear-gradient(135deg, #fff1f6 0%, #fff9e9 55%, #eafaf8 100%);
      border-bottom: 1px solid rgba(242, 223, 229, 0.9);
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: "❄︎";
      position: absolute;
      left: 20px;
      top: 20px;
      color: rgba(255, 127, 162, 0.26);
      font-size: 44px;
      transform: rotate(-10deg);
    }

    header::after {
      content: "しろくま";
      position: absolute;
      right: -16px;
      bottom: -8px;
      width: 150px;
      height: 106px;
      color: transparent;
      background:
        radial-gradient(circle at 42% 33%, #3d2f36 0 4px, transparent 5px),
        radial-gradient(circle at 65% 33%, #3d2f36 0 4px, transparent 5px),
        radial-gradient(circle at 53% 51%, #cf8094 0 5px, transparent 6px),
        radial-gradient(circle at 30% 18%, #fff 0 18px, #f7e2e9 19px 21px, transparent 22px),
        radial-gradient(circle at 74% 18%, #fff 0 18px, #f7e2e9 19px 21px, transparent 22px),
        radial-gradient(ellipse at center, #fff 0 58px, #f7e2e9 59px 62px, transparent 63px);
      opacity: 0.82;
    }

    .wrap {
      max-width: 1040px;
      margin: 0 auto;
      padding: 16px;
      position: relative;
      z-index: 1;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 8vw, 42px);
      line-height: 1.05;
      letter-spacing: 0.04em;
      color: #6b3b45;
    }

    .appmark {
      width: 42px;
      height: 42px;
      border-radius: 15px;
      background: linear-gradient(135deg, #ff9bb7, #b7eee8);
      display: inline-grid;
      place-items: center;
      box-shadow: var(--soft-shadow);
      font-size: 23px;
    }

    .version {
      font-size: 12px;
      font-weight: 800;
      color: #fff;
      background: var(--primary);
      border-radius: 999px;
      padding: 5px 10px;
      box-shadow: 0 6px 16px rgba(255, 127, 162, 0.25);
    }

    .subtitle {
      margin: 10px 0 0;
      color: #6d6268;
      font-size: 14px;
      max-width: 620px;
      font-weight: 600;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    @media (min-width: 900px) {
      .grid { grid-template-columns: 380px 1fr; align-items: start; }
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(242, 223, 229, 0.95);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      backdrop-filter: blur(8px);
    }

    .card-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    h2 {
      margin: 0;
      font-size: 19px;
      letter-spacing: 0.02em;
    }

    .icon-bubble {
      width: 34px;
      height: 34px;
      display: inline-grid;
      place-items: center;
      border-radius: 13px;
      background: #fff0f5;
      border: 1px solid #ffd2df;
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 800;
    }

    input, select, textarea, button { font: inherit; }

    input, select, textarea {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      padding: 12px 13px;
      border: 1px solid #ead9df;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.96);
      color: var(--text);
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
    }

    input[type="date"] {
      appearance: none;
      -webkit-appearance: none;
      font-size: 16px;
      line-height: 1.25;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(255, 127, 162, 0.14);
    }

    textarea { min-height: 78px; resize: vertical; }

    .field { margin-bottom: 13px; min-width: 0; }

    .row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 11px;
      min-width: 0;
    }

    @media (max-width: 560px) {
      .row.date-row { grid-template-columns: 1fr; }
    }

    .actions {
      display: flex;
      gap: 9px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 11px 16px;
      background: linear-gradient(135deg, var(--primary), #ff91ad);
      color: #fff;
      cursor: pointer;
      font-weight: 850;
      box-shadow: 0 9px 18px rgba(255, 127, 162, 0.22);
      touch-action: manipulation;
    }

    button:hover { background: linear-gradient(135deg, var(--primary-dark), #ff7fa2); }

    button.secondary {
      background: #fff5f8;
      color: #7b4550;
      border: 1px solid #ffd2df;
      box-shadow: none;
    }

    button.secondary:hover { background: #ffe8f0; }

    button.ghost {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    button.ghost:hover { background: #fff7fa; }

    button.danger {
      background: #fff1f1;
      color: #a44242;
      border: 1px solid #ffd1d1;
      box-shadow: none;
    }

    button.danger:hover { background: #ffe4e4; }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    @media (min-width: 680px) {
      .toolbar { grid-template-columns: 1.4fr 1fr 1fr; }
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 9px;
      margin-bottom: 14px;
    }

    .summary div {
      background: linear-gradient(135deg, #fff8fa, #f2fffd);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 11px;
      min-width: 0;
    }

    .summary strong { display: block; font-size: 23px; color: #6b3b45; }
    .summary span { color: var(--muted); font-size: 12px; font-weight: 750; }

    .item {
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 13px;
      margin-bottom: 11px;
      background: rgba(255,255,255,0.96);
      box-shadow: var(--soft-shadow);
      position: relative;
      overflow: hidden;
    }

    .item::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 6px;
      background: linear-gradient(180deg, #ff9bb7, #b7eee8);
    }

    .item-head {
      display: flex;
      gap: 9px;
      justify-content: space-between;
      align-items: start;
      padding-left: 4px;
    }

    .item-title {
      margin: 0;
      font-size: 16px;
      font-weight: 900;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 12px;
      background: #fff7e9;
      color: #6b4b28;
      border: 1px solid #ffe7b8;
      font-weight: 750;
    }

    .badge.warn { background: #fff5dc; color: #91560f; border-color: #ffd993; }
    .badge.danger { background: #fff0f0; color: #a23a3a; border-color: #ffc9c9; }
    .badge.ok { background: #effbf7; color: #277557; border-color: #c8eee2; }
    .badge.mint { background: #effbf9; color: #226f69; border-color: #c9f0eb; }
    .badge.pink { background: #fff0f5; color: #8a4054; border-color: #ffd2df; }

    .item-note {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      white-space: pre-wrap;
    }

    .qty-controls {
      display: flex;
      gap: 7px;
      align-items: center;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .qty-controls button { padding: 8px 12px; min-width: 40px; }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 34px 10px;
      border: 1px dashed #efc9d4;
      border-radius: 20px;
      background: rgba(255, 249, 251, 0.9);
      font-weight: 700;
    }

    .small { font-size: 12px; color: var(--muted); }
    .hidden { display: none !important; }

    .mode-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .mode-tabs button.active {
      background: linear-gradient(135deg, var(--primary), #ff9bb7);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 9px 18px rgba(255, 127, 162, 0.18);
    }

    .compact-list { display: grid; gap: 10px; }

    .shopping-section {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: #fff;
      overflow: hidden;
      box-shadow: var(--soft-shadow);
    }

    .shopping-heading {
      padding: 11px 13px;
      font-weight: 900;
      background: linear-gradient(135deg, #fff0f5, #f2fffd);
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #6b3b45;
    }

    .shopping-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 11px 13px;
      border-bottom: 1px solid #faedf1;
    }

    .shopping-row:last-child { border-bottom: 0; }
    .shopping-name { font-weight: 850; }
    .shopping-meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .qty-large { font-size: 18px; font-weight: 950; white-space: nowrap; color: #ff6f97; }

    .hint-box {
      background: #f0fffd;
      border: 1px solid #c9f0eb;
      color: #226f69;
      border-radius: 18px;
      padding: 11px 13px;
      font-size: 13px;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .form-note {
      font-size: 12px;
      color: var(--muted);
      margin-top: -6px;
      margin-bottom: 10px;
    }

    .divider {
      border: 0;
      border-top: 1px dashed var(--line);
      margin: 18px 0;
    }

    @media (max-width: 520px) {
      .wrap { padding: 14px; }
      .card { padding: 16px; border-radius: 22px; }
      .summary { gap: 7px; }
      .summary div { padding: 9px; }
      .summary strong { font-size: 20px; }
      .item-head { align-items: flex-start; }
      .item-head button { padding: 8px 12px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <div class="brand-row">
        <span class="appmark" aria-hidden="true">🧊</span>
        <h1>ふりこれ</h1>
        <span class="version">v1.2</span>
      </div>
      <p class="subtitle">冷凍庫の在庫を「何個あるか」と「冷凍から何日経ったか」で、かわいく確認。</p>
    </div>
  </header>

  <main class="wrap grid">
    <section class="card">
      <div class="card-title"><span class="icon-bubble">➕</span><h2 id="formTitle">在庫を追加</h2></div>
      <form id="itemForm">
        <input type="hidden" id="editingId" />

        <div class="field">
          <label for="name">品名</label>
          <input id="name" required placeholder="例：鶏むね肉、冷凍うどん" />
        </div>

        <div class="row">
          <div class="field">
            <label for="category">カテゴリ</label>
            <select id="category">
              <option>肉</option>
              <option>魚</option>
              <option>野菜</option>
              <option>惣菜</option>
              <option>主食</option>
              <option>お菓子</option>
              <option>その他</option>
            </select>
          </div>
          <div class="field">
            <label for="location">保管場所</label>
            <select id="location">
              <option>冷凍庫</option>
              <option>上段</option>
              <option>中段</option>
              <option>下段</option>
              <option>ドアポケット</option>
              <option>別冷凍庫</option>
              <option>その他</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="quantity">数量</label>
            <input id="quantity" type="number" min="0" step="1" value="1" required />
          </div>
          <div class="field">
            <label for="unit">単位</label>
            <select id="unit">
              <option>個</option>
              <option>袋</option>
              <option>パック</option>
              <option>食</option>
              <option>本</option>
              <option>枚</option>
              <option>g</option>
            </select>
          </div>
        </div>
        <p class="form-note">肉は「200gパックが何個」のように、実際に使う単位で登録する想定です。</p>

        <div class="row date-row">
          <div class="field">
            <label for="frozenDate">冷凍日</label>
            <input id="frozenDate" type="date" />
          </div>
          <div class="field">
            <label for="bestBefore">期限目安（任意）</label>
            <input id="bestBefore" type="date" />
          </div>
        </div>
        <p class="form-note">期限日よりも「冷凍からの経過日数」を重視します。期限目安は必要なものだけ入力してください。</p>

        <div class="field">
          <label for="memo">メモ</label>
          <textarea id="memo" placeholder="例：200gずつ小分け、味付け済み"></textarea>
        </div>

        <div class="actions">
          <button type="submit">保存</button>
          <button class="secondary" type="button" id="resetFormBtn">入力をクリア</button>
        </div>
      </form>

      <hr class="divider" />

      <div class="card-title"><span class="icon-bubble">☁️</span><h2>バックアップ</h2></div>
      <p class="small">GitHub Pagesを更新する前に、エクスポートしておくと安全です。</p>
      <div class="actions">
        <button class="ghost" type="button" id="exportBtn">JSONエクスポート</button>
        <button class="ghost" type="button" id="importBtn">JSONインポート</button>
        <input class="hidden" type="file" id="importFile" accept="application/json,.json" />
      </div>
      <p class="small" id="storageInfo"></p>
    </section>

    <section class="card">
      <div class="card-title"><span class="icon-bubble">🔎</span><h2>在庫一覧</h2></div>

      <div class="summary">
        <div><strong id="totalKinds">0</strong><span>種類</span></div>
        <div><strong id="totalQty">0</strong><span>合計数量</span></div>
        <div><strong id="oldCount">0</strong><span>30日超</span></div>
      </div>

      <div class="mode-tabs">
        <button class="secondary active" type="button" id="normalModeBtn">🏠 通常</button>
        <button class="secondary" type="button" id="shoppingModeBtn">🛒 買い物モード</button>
      </div>

      <div class="toolbar">
        <input id="searchText" placeholder="品名・メモで検索" />
        <select id="filterCategory">
          <option value="">全カテゴリ</option>
          <option>肉</option><option>魚</option><option>野菜</option><option>惣菜</option><option>主食</option><option>お菓子</option><option>その他</option>
        </select>
        <select id="sortBy">
          <option value="frozenOldest">古い順</option>
          <option value="frozenDateDesc">新しい順</option>
          <option value="name">品名順</option>
          <option value="category">カテゴリ順</option>
          <option value="quantityDesc">数量が多い順</option>
        </select>
      </div>

      <div id="modeHint" class="hint-box hidden"></div>
      <div id="itemsList"></div>
    </section>
  </main>

  <script>
    const APP_VERSION = "1.2";
    const STORAGE_KEY = "freezer_inventory_app_data";
    const CURRENT_SCHEMA_VERSION = 1;
    const CATEGORY_ORDER = ["肉", "魚", "野菜", "惣菜", "主食", "お菓子", "その他"];
    const CATEGORY_ICON = { "肉": "🍗", "魚": "🐟", "野菜": "🥦", "惣菜": "🍱", "主食": "🍚", "お菓子": "🍨", "その他": "🧊" };

    const defaultData = () => ({
      schemaVersion: CURRENT_SCHEMA_VERSION,
      appVersion: APP_VERSION,
      updatedAt: new Date().toISOString(),
      items: []
    });

    let data = loadData();
    let viewMode = "normal";

    const $ = (id) => document.getElementById(id);
    const form = $("itemForm");
    const itemsList = $("itemsList");

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return defaultData();
        const parsed = JSON.parse(raw);
        return migrateData(parsed);
      } catch (error) {
        console.error(error);
        alert("保存データの読み込みに失敗しました。バックアップJSONがあればインポートしてください。");
        return defaultData();
      }
    }

    function migrateData(oldData) {
      if (!oldData || typeof oldData !== "object") return defaultData();
      if (!Array.isArray(oldData.items)) oldData.items = [];
      if (!oldData.schemaVersion) oldData.schemaVersion = 1;
      return {
        schemaVersion: CURRENT_SCHEMA_VERSION,
        appVersion: APP_VERSION,
        updatedAt: oldData.updatedAt || new Date().toISOString(),
        items: oldData.items.map(normalizeItem)
      };
    }

    function normalizeItem(item) {
      return {
        id: item.id || crypto.randomUUID(),
        name: item.name || "",
        category: item.category || "その他",
        quantity: Number(item.quantity || 0),
        unit: item.unit || "個",
        frozenDate: item.frozenDate || "",
        bestBefore: item.bestBefore || "",
        location: item.location || "冷凍庫",
        memo: item.memo || "",
        createdAt: item.createdAt || new Date().toISOString(),
        updatedAt: item.updatedAt || new Date().toISOString()
      };
    }

    function saveData() {
      data.updatedAt = new Date().toISOString();
      data.appVersion = APP_VERSION;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      render();
    }

    function getFormItem() {
      const now = new Date().toISOString();
      return {
        id: $("editingId").value || crypto.randomUUID(),
        name: $("name").value.trim(),
        category: $("category").value,
        quantity: Number($("quantity").value),
        unit: $("unit").value,
        frozenDate: $("frozenDate").value,
        bestBefore: $("bestBefore").value,
        location: $("location").value,
        memo: $("memo").value.trim(),
        createdAt: now,
        updatedAt: now
      };
    }

    function resetForm() {
      form.reset();
      $("editingId").value = "";
      $("quantity").value = 1;
      $("unit").value = "個";
      $("frozenDate").value = new Date().toISOString().slice(0, 10);
      $("formTitle").textContent = "在庫を追加";
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const item = getFormItem();
      if (!item.name) return;
      const existingIndex = data.items.findIndex((x) => x.id === item.id);
      if (existingIndex >= 0) {
        item.createdAt = data.items[existingIndex].createdAt;
        data.items[existingIndex] = item;
      } else {
        data.items.unshift(item);
      }
      saveData();
      resetForm();
    });

    $("resetFormBtn").addEventListener("click", resetForm);

    ["searchText", "filterCategory", "sortBy"].forEach((id) => {
      $(id).addEventListener("input", render);
      $(id).addEventListener("change", render);
    });

    $("normalModeBtn").addEventListener("click", () => setViewMode("normal"));
    $("shoppingModeBtn").addEventListener("click", () => setViewMode("shopping"));

    function setViewMode(mode) {
      viewMode = mode;
      $("normalModeBtn").classList.toggle("active", mode === "normal");
      $("shoppingModeBtn").classList.toggle("active", mode === "shopping");
      render();
    }

    $("exportBtn").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const date = new Date().toISOString().slice(0, 10);
      a.href = url;
      a.download = `furikore_backup_${date}.json`;
      a.click();
      URL.revokeObjectURL(url);
    });

    $("importBtn").addEventListener("click", () => $("importFile").click());

    $("importFile").addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        const imported = migrateData(JSON.parse(text));
        const ok = confirm("現在の在庫データを、インポートしたデータで置き換えます。よろしいですか？");
        if (!ok) return;
        data = imported;
        saveData();
        alert("インポートしました。");
      } catch (error) {
        console.error(error);
        alert("インポートに失敗しました。JSONファイルを確認してください。");
      } finally {
        event.target.value = "";
      }
    });

    function daysSince(dateString) {
      if (!dateString) return null;
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const target = new Date(dateString + "T00:00:00");
      return Math.max(0, Math.round((today - target) / 86400000));
    }

    function daysUntil(dateString) {
      if (!dateString) return null;
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const target = new Date(dateString + "T00:00:00");
      return Math.round((target - today) / 86400000);
    }

    function formatDate(dateString) {
      if (!dateString) return "未設定";
      return dateString.replaceAll("-", "/");
    }

    function ageBadge(item) {
      const days = daysSince(item.frozenDate);
      if (days === null) return `<span class="badge">❄️ 冷凍日未設定</span>`;
      if (days >= 31) return `<span class="badge danger">⚠️ 冷凍から${days}日</span>`;
      if (days >= 15) return `<span class="badge warn">⏳ 冷凍から${days}日</span>`;
      return `<span class="badge ok">✨ 冷凍から${days}日</span>`;
    }

    function bestBeforeBadge(item) {
      const days = daysUntil(item.bestBefore);
      if (days === null) return "";
      if (days < 0) return `<span class="badge danger">期限超過 ${Math.abs(days)}日</span>`;
      if (days <= 7) return `<span class="badge warn">期限まで${days}日</span>`;
      return `<span class="badge">期限 ${formatDate(item.bestBefore)}</span>`;
    }

    function filteredItems() {
      const keyword = $("searchText").value.trim().toLowerCase();
      const category = $("filterCategory").value;
      const sortBy = $("sortBy").value;
      let items = data.items.filter((item) => {
        const keywordMatch = !keyword || `${item.name} ${item.memo}`.toLowerCase().includes(keyword);
        const categoryMatch = !category || item.category === category;
        return keywordMatch && categoryMatch && Number(item.quantity || 0) > 0;
      });
      items.sort((a, b) => {
        if (sortBy === "frozenOldest") return (a.frozenDate || "9999-12-31").localeCompare(b.frozenDate || "9999-12-31");
        if (sortBy === "frozenDateDesc") return (b.frozenDate || "").localeCompare(a.frozenDate || "");
        if (sortBy === "name") return a.name.localeCompare(b.name, "ja");
        if (sortBy === "category") return categoryRank(a.category) - categoryRank(b.category) || a.name.localeCompare(b.name, "ja");
        if (sortBy === "quantityDesc") return Number(b.quantity || 0) - Number(a.quantity || 0);
        return 0;
      });
      return items;
    }

    function categoryRank(category) {
      const index = CATEGORY_ORDER.indexOf(category);
      return index >= 0 ? index : 999;
    }

    function categoryIcon(category) {
      return CATEGORY_ICON[category] || "🧊";
    }

    function formatQty(item) {
      const qty = Number(item.quantity || 0);
      const display = Number.isInteger(qty) ? String(qty) : qty.toFixed(1);
      return `${display}${item.unit}`;
    }

    function render() {
      const items = filteredItems();
      const activeItems = data.items.filter((item) => Number(item.quantity || 0) > 0);
      const totalQty = activeItems.reduce((sum, item) => sum + Number(item.quantity || 0), 0);
      const oldCount = activeItems.filter((item) => {
        const days = daysSince(item.frozenDate);
        return days !== null && days >= 31;
      }).length;
      $("totalKinds").textContent = activeItems.length;
      $("totalQty").textContent = Number.isInteger(totalQty) ? totalQty : totalQty.toFixed(1);
      $("oldCount").textContent = oldCount;
      $("storageInfo").textContent = `保存キー：${STORAGE_KEY} / schemaVersion：${data.schemaVersion} / app v${APP_VERSION}`;

      if (items.length === 0) {
        $("modeHint").classList.add("hidden");
        itemsList.innerHTML = `<div class="empty">🧊 在庫がありません。まずは左のフォームから追加してください。</div>`;
        return;
      }
      if (viewMode === "shopping") renderShoppingMode(items);
      else renderNormalMode(items);
    }

    function renderNormalMode(items) {
      $("modeHint").classList.add("hidden");
      itemsList.innerHTML = items.map((item) => `
        <article class="item">
          <div class="item-head">
            <div>
              <p class="item-title">${categoryIcon(item.category)} ${escapeHtml(item.name)} <span class="qty-large">${escapeHtml(formatQty(item))}</span></p>
              <div class="badges">
                <span class="badge pink">${escapeHtml(item.category)}</span>
                <span class="badge mint">${escapeHtml(item.location)}</span>
                ${ageBadge(item)}
                ${bestBeforeBadge(item)}
              </div>
            </div>
            <button class="ghost" type="button" onclick="editItem('${item.id}')">編集</button>
          </div>
          <p class="small">冷凍日：${formatDate(item.frozenDate)}</p>
          ${item.memo ? `<p class="item-note">📝 ${escapeHtml(item.memo)}</p>` : ""}
          <div class="qty-controls">
            <button class="secondary" type="button" onclick="changeQty('${item.id}', -1)">−1</button>
            <button class="secondary" type="button" onclick="changeQty('${item.id}', 1)">＋1</button>
            <button class="ghost" type="button" onclick="setZero('${item.id}')">使い切り</button>
            <button class="danger" type="button" onclick="deleteItem('${item.id}')">削除</button>
          </div>
        </article>
      `).join("");
    }

    function renderShoppingMode(items) {
      $("modeHint").textContent = "買い物中に確認しやすいよう、編集ボタンを減らしてカテゴリ別に表示しています。安くても在庫が多いものは買い足し不要か判断しやすくするための表示です。";
      $("modeHint").classList.remove("hidden");
      const groups = CATEGORY_ORDER.map((category) => [category, items.filter((item) => item.category === category)])
        .filter(([, groupItems]) => groupItems.length > 0);
      itemsList.innerHTML = `<div class="compact-list">${groups.map(([category, groupItems]) => `
        <section class="shopping-section">
          <div class="shopping-heading"><span>${categoryIcon(category)} ${escapeHtml(category)}</span><span>${groupItems.length}種類</span></div>
          ${groupItems.map((item) => `
            <div class="shopping-row">
              <div>
                <div class="shopping-name">${escapeHtml(item.name)}</div>
                <div class="shopping-meta">${escapeHtml(item.location)} / 冷凍日：${formatDate(item.frozenDate)}${daysSince(item.frozenDate) !== null ? ` / ${daysSince(item.frozenDate)}日経過` : ""}</div>
              </div>
              <div class="qty-large">${escapeHtml(formatQty(item))}</div>
            </div>
          `).join("")}
        </section>
      `).join("")}</div>`;
    }

    function editItem(id) {
      const item = data.items.find((x) => x.id === id);
      if (!item) return;
      $("editingId").value = item.id;
      $("name").value = item.name;
      $("category").value = item.category;
      $("quantity").value = item.quantity;
      $("unit").value = item.unit;
      $("frozenDate").value = item.frozenDate;
      $("bestBefore").value = item.bestBefore;
      $("location").value = item.location;
      $("memo").value = item.memo;
      $("formTitle").textContent = "在庫を編集";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function changeQty(id, diff) {
      const item = data.items.find((x) => x.id === id);
      if (!item) return;
      item.quantity = Math.max(0, Number(item.quantity || 0) + diff);
      item.updatedAt = new Date().toISOString();
      saveData();
    }

    function setZero(id) {
      const item = data.items.find((x) => x.id === id);
      if (!item) return;
      const ok = confirm(`${item.name} を使い切りにしますか？数量が0になります。`);
      if (!ok) return;
      item.quantity = 0;
      item.updatedAt = new Date().toISOString();
      saveData();
    }

    function deleteItem(id) {
      const item = data.items.find((x) => x.id === id);
      if (!item) return;
      const ok = confirm(`${item.name} を削除しますか？`);
      if (!ok) return;
      data.items = data.items.filter((x) => x.id !== id);
      saveData();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    resetForm();
    render();
  </script>
</body>
</html>
